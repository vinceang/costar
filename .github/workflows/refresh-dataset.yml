name: Refresh dataset

on:
  schedule:
    - cron: '0 4 * * *'   # 04:00 UTC daily
  workflow_dispatch:        # allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Rebuild dataset
        env:
          TMDB_READ_TOKEN: ${{ secrets.TMDB_READ_TOKEN }}
        run: node scripts/build-dataset.mjs

      - name: Commit updated graph
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/graph.json
          git diff --cached --quiet || git commit -m "chore: refresh dataset [skip ci]"
          git push
